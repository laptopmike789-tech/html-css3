<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AK-47 NOOB HUNTER - FIXED GROUND</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; bottom: 30px; left: 30px; color: white; text-shadow: 2px 2px #000; z-index: 10; pointer-events: none; }
        #healthContainer { width: 250px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; overflow: hidden; }
        #healthBar { width: 100%; height: 100%; background: #ff3333; }
        #ammo { font-size: 35px; color: #ffd700; margin-top: 10px; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair:before, #crosshair:after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
        #crosshair:before { left: 9px; top: 0; width: 2px; height: 20px; }
        #crosshair:after { left: 0; top: 9px; width: 20px; height: 2px; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; cursor: pointer; text-align: center; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff3333; font-size: 60px; display: none; z-index: 15; text-shadow: 3px 3px #000; text-align: center; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; font-weight: bold; margin-top: 20px; border-radius: 5px; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="blocker">
        <h1 style="font-size: 50px; margin-bottom: 0;">NOOB FOREST SURVIVAL</h1>
        <p style="font-size: 20px;">CLICK TO DEPLOY</p>
        <p style="color: #ccc;">WASD = Move | Mouse = Aim | Click = FIRE | R = Reload</p>
    </div>

    <div id="msg">MISSION FAILED<br><button onclick="location.reload()">RESTART</button></div>

    <div id="ui">
        <div id="healthContainer"><div id="healthBar"></div></div>
        <div id="ammo">AK-47: 30 / 30</div>
        <div id="reloadAlert" style="color: #ff3333; display: none; font-size: 20px; animation: blink 0.5s infinite;">LOW AMMO - PRESS R</div>
    </div>
    
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. ENGINE & SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // Eye level is at 2 meters

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- 2. FIXED GROUND (THE BIG GREEN FLOOR) ---
        // We use a Box instead of a Plane so it's solid and easy to see
        const groundGeo = new THREE.BoxGeometry(1000, 2, 1000); 
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x355e3b }); // Forest Green
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -1; // Top of the box is exactly at 0
        scene.add(ground);

        // Add a visible grid so you feel the movement
        const grid = new THREE.GridHelper(1000, 100, 0x000000, 0x224422);
        grid.position.y = 0.05;
        scene.add(grid);

        // --- 3. TREES ---
        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 4), new THREE.MeshLambertMaterial({color: 0x4b3621}));
            trunk.position.y = 2;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 6, 8), new THREE.MeshLambertMaterial({color: 0x1b3022}));
            leaves.position.y = 6;
            tree.add(trunk, leaves);
            tree.position.set(x, 0, z);
            scene.add(tree);
        }
        for(let i=0; i<80; i++) {
            createTree((Math.random()-0.5)*250, (Math.random()-0.5)*250);
        }

        // --- 4. AK-47 WEAPON ---
        const gun = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.7), new THREE.MeshLambertMaterial({color: 0x5c3317}));
        const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.9), new THREE.MeshLambertMaterial({color: 0x111111}));
        barrel.position.z = -0.5;
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, 0.18), new THREE.MeshLambertMaterial({color: 0x222222}));
        mag.position.set(0, -0.25, -0.2); mag.rotation.x = 0.3;
        gun.add(body, barrel, mag);
        gun.position.set(0.5, -0.5, -0.8);
        camera.add(gun);
        scene.add(camera);

        const flash = new THREE.PointLight(0xffaa00, 0, 10);
        flash.position.set(0.5, -0.4, -1.5);
        camera.add(flash);

        // --- 5. NOOB ENEMIES ---
        let enemies = [];
        function spawnNoob() {
            const noob = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshLambertMaterial({color: 0xffff00}));
            head.position.y = 2.6;
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.6), new THREE.MeshLambertMaterial({color: 0x0000ff}));
            torso.position.y = 1.5;
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), new THREE.MeshLambertMaterial({color: 0xffff00}));
            lArm.position.set(-0.85, 1.5, 0);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), new THREE.MeshLambertMaterial({color: 0xffff00}));
            rArm.position.set(0.85, 1.5, 0);
            const legs = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.6), new THREE.MeshLambertMaterial({color: 0x00ff00}));
            legs.position.y = 0.4;
            noob.add(head, torso, lArm, rArm, legs);
            
            const dist = 60 + Math.random()*30;
            const ang = Math.random()*Math.PI*2;
            noob.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(noob);
            enemies.push(noob);
        }
        setInterval(spawnNoob, 2500);

        // --- 6. GAME CONTROLS ---
        let health = 100, ammo = 30, reloading = false;
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('blocker').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('blocker').style.display = 'none');
        controls.addEventListener('unlock', () => { if(health > 0) document.getElementById('blocker').style.display = 'flex'; });

        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if(!controls.isLocked || ammo <= 0 || reloading) return;
            ammo--;
            flash.intensity = 20;
            gun.position.z += 0.08; // Kickback
            setTimeout(() => { flash.intensity = 0; gun.position.z = -0.8; }, 40);
            updateUI();
            
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(enemies, true);
            if(hits.length > 0) {
                let hitNoob = hits[0].object;
                while(hitNoob.parent && !enemies.includes(hitNoob)) hitNoob = hitNoob.parent;
                scene.remove(hitNoob);
                enemies = enemies.filter(e => e !== hitNoob);
            }
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyR' && ammo < 30 && !reloading) {
                reloading = true;
                document.getElementById('reloadAlert').innerText = "RELOADING...";
                document.getElementById('reloadAlert').style.display = 'block';
                gun.rotation.x = -0.6;
                setTimeout(() => {
                    ammo = 30; reloading = false; gun.rotation.x = 0;
                    document.getElementById('reloadAlert').style.display = 'none';
                    updateUI();
                }, 1200);
            }
        });

        function updateUI() {
            document.getElementById('ammo').innerText = `AK-47: ${ammo} / 30`;
            document.getElementById('healthBar').style.width = health + "%";
            if(ammo <= 0) document.getElementById('reloadAlert').style.display = 'block';
        }

        // --- 7. MAIN LOOP ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            if(!controls.isLocked) return;
            
            const time = performance.now();
            const delta = (time - lastTime) / 1000;
            lastTime = time;

            // Movement
            const speed = 18 * delta;
            if(keys['KeyW']) controls.moveForward(speed);
            if(keys['KeyS']) controls.moveForward(-speed);
            if(keys['KeyA']) controls.moveRight(-speed);
            if(keys['KeyD']) controls.moveRight(speed);

            // Enemy Logic
            enemies.forEach(noob => {
                const dir = new THREE.Vector3().subVectors(camera.position, noob.position).normalize();
                noob.position.x += dir.x * 6 * delta;
                noob.position.z += dir.z * 6 * delta;
                noob.lookAt(camera.position.x, 0, camera.position.z);

                // Collision
                if(noob.position.distanceTo(camera.position) < 2.5) {
                    health -= 30 * delta;
                    updateUI();
                    if(health <= 0) {
                        document.getElementById('msg').style.display = 'block';
                        controls.unlock();
                    }
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
