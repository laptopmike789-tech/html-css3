<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOOB HUNTER MOBILE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        
        /* UI OVERLAYS */
        #ui-top { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px #000; z-index: 10; width: 100%; pointer-events: none; }
        #healthContainer { width: 150px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; }
        #healthBar { width: 100%; height: 100%; background: #ff3333; }
        
        /* MOBILE CONTROLS */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 20; border: 2px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.8; }
        
        #btn-fire { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; background: rgba(255,0,0,0.6); border: 4px solid #fff; border-radius: 50%; z-index: 20; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 20px; -webkit-user-select: none; }
        #btn-reload { position: absolute; bottom: 170px; right: 50px; width: 70px; height: 70px; background: rgba(255,215,0,0.6); border: 3px solid #fff; border-radius: 50%; z-index: 20; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px; -webkit-user-select: none; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 5; }
        #ammo-text { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: yellow; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 40px; display: none; text-align: center; z-index: 30; background: rgba(0,0,0,0.8); padding: 20px; width: 80%; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>

    <div id="ui-top">
        <div id="healthContainer"><div id="healthBar"></div></div>
        <div id="score">Score: 0</div>
    </div>

    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="btn-fire">FIRE</div>
    <div id="btn-reload">RELOAD</div>
    <div id="ammo-text">30 / 30</div>
    <div id="crosshair"></div>
    <div id="msg">GAME OVER<br><button onclick="location.reload()" style="padding:10px; margin-top:10px;">RESTART</button></div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance boost
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

        // --- 2. GROUND & TREES ---
        const ground = new THREE.Mesh(new THREE.BoxGeometry(1000, 2, 1000), new THREE.MeshLambertMaterial({ color: 0x355e3b }));
        ground.position.y = -1;
        scene.add(ground);

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 3), new THREE.MeshLambertMaterial({color: 0x4b3621}));
            trunk.position.y = 1.5;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 5, 7), new THREE.MeshLambertMaterial({color: 0x1b3022}));
            leaves.position.y = 5;
            tree.add(trunk, leaves);
            tree.position.set(x, 0, z);
            scene.add(tree);
        }
        for(let i=0; i<50; i++) createTree((Math.random()-0.5)*150, (Math.random()-0.5)*150);

        // --- 3. AK-47 ---
        const gun = new THREE.Group();
        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshLambertMaterial({color: 0x5c3317}));
        const gBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.8), new THREE.MeshLambertMaterial({color: 0x222222}));
        gBarrel.position.z = -0.4;
        const gMag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.3, 0.15), new THREE.MeshLambertMaterial({color: 0x111111}));
        gMag.position.set(0, -0.2, -0.2); gMag.rotation.x = 0.3;
        gun.add(gBody, gBarrel, gMag);
        gun.position.set(0.3, -0.3, -0.6);
        camera.add(gun);
        scene.add(camera);

        const flash = new THREE.PointLight(0xffaa00, 0, 10);
        flash.position.set(0.3, -0.2, -1.3);
        camera.add(flash);

        // --- 4. MOBILE CONTROLS LOGIC ---
        let moveX = 0, moveZ = 0; // Movement input
        let yaw = 0, pitch = 0;   // Camera rotation
        let health = 100, ammo = 30, reloading = false, score = 0;

        // Joystick
        const joystickZone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        
        joystickZone.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            const lx = Math.cos(angle) * dist;
            const ly = Math.sin(angle) * dist;
            
            knob.style.transform = `translate(${lx}px, ${ly}px)`;
            
            moveX = lx / 50;
            moveZ = ly / 50;
        });

        joystickZone.addEventListener('touchend', () => {
            knob.style.transform = `translate(0px, 0px)`;
            moveX = 0; moveZ = 0;
        });

        // Touch Look (Right side of screen)
        let lastTouchX = 0, lastTouchY = 0;
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let t of e.touches) {
                if (t.clientX > window.innerWidth / 2) {
                    let dx = t.clientX - lastTouchX;
                    let dy = t.clientY - lastTouchY;
                    yaw -= dx * 0.005;
                    pitch -= dy * 0.005;
                    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        });

        // Fire & Reload Buttons
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
        document.getElementById('btn-reload').addEventListener('touchstart', (e) => { e.preventDefault(); reload(); });

        // --- 5. SHOOTING & ENEMIES ---
        let enemies = [];
        const raycaster = new THREE.Raycaster();

        function shoot() {
            if(ammo <= 0 || reloading || health <= 0) return;
            ammo--;
            flash.intensity = 20;
            gun.position.z += 0.05;
            setTimeout(() => { flash.intensity = 0; gun.position.z = -0.6; }, 50);
            updateUI();

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(enemies, true);
            if(hits.length > 0) {
                let victim = hits[0].object;
                while(victim.parent && !enemies.includes(victim)) victim = victim.parent;
                scene.remove(victim);
                enemies = enemies.filter(e => e !== victim);
                score += 10;
                document.getElementById('score').innerText = `Score: ${score}`;
            }
        }

        function reload() {
            if(reloading || ammo === 30) return;
            reloading = true;
            gun.rotation.x = -0.5;
            setTimeout(() => {
                ammo = 30; reloading = false; gun.rotation.x = 0;
                updateUI();
            }, 1200);
        }

        function updateUI() {
            document.getElementById('ammo-text').innerText = `${ammo} / 30`;
            document.getElementById('healthBar').style.width = health + "%";
        }

        function spawnNoob() {
            const noob = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7), new THREE.MeshLambertMaterial({color: 0xffff00})); head.position.y = 2.4;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1,1.2,0.5), new THREE.MeshLambertMaterial({color: 0x0000ff})); body.position.y = 1.4;
            const leg = new THREE.Mesh(new THREE.BoxGeometry(1,0.6,0.5), new THREE.MeshLambertMaterial({color: 0x00ff00})); leg.position.y = 0.4;
            noob.add(head, body, leg);
            const ang = Math.random()*Math.PI*2;
            noob.position.set(Math.cos(ang)*50, 0, Math.sin(ang)*50);
            scene.add(noob);
            enemies.push(noob);
        }
        setInterval(spawnNoob, 3000);

        // --- 6. GAME LOOP ---
        let lastFrame = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const delta = (now - lastFrame) / 1000;
            lastFrame = now;

            if (health > 0) {
                // Apply Look
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                // Apply Move (WASD also works for testing on PC)
                const moveSpeed = 15 * delta;
                camera.translateZ(moveZ * moveSpeed);
                camera.translateX(moveX * moveSpeed);
                camera.position.y = 2; // Stay on ground

                // Enemy AI
                enemies.forEach(noob => {
                    const dir = new THREE.Vector3().subVectors(camera.position, noob.position).normalize();
                    noob.position.x += dir.x * 5 * delta;
                    noob.position.z += dir.z * 5 * delta;
                    noob.lookAt(camera.position.x, 0, camera.position.z);
                    if(noob.position.distanceTo(camera.position) < 2) {
                        health -= 25 * delta;
                        updateUI();
                        if(health <= 0) document.getElementById('msg').style.display = 'block';
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
